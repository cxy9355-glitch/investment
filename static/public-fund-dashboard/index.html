<!DOCTYPE html>
<html lang="zh-CN">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公募持仓与估值筛选看板</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2311263a'/%3E%3Cpath d='M14 44h12l7-10 8 7 9-18' fill='none' stroke='%23fff7ed' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./dashboard.css">
</head>
<body>
  <main class="page-shell">
    <header class="hero-panel">
      <div>
        <p class="eyebrow">Static Research Dashboard</p>
        <h1>公募持仓与估值筛选看板</h1>
        <p class="hero-copy">用“占总股本比例”和“池内占比”两种口径观察公募机构偏好，快速筛出值得进一步深挖的候选标的。</p>
      </div>
      <div class="hero-links">
        <a class="ghost-link" href="./methodology.html">方法说明</a>
        <span class="muted-text">静态站点，可直接部署到 GitHub Pages</span>
        <p id="updatedAt" class="muted-text">更新中...</p>
      </div>
    </header>

    <section class="method-panel">
      <div class="section-head">
        <div>
          <p class="eyebrow">Methodology</p>
          <h2>切换机构持仓口径</h2>
        </div>
      </div>
      <div id="methodSwitch" class="method-switch"></div>
      <p id="methodDescription" class="method-description"></p>
    </section>

    <section class="filter-panel">
      <div class="section-head">
        <div>
          <p class="eyebrow">Filters</p>
          <h2>快速筛选</h2>
        </div>
        <button id="resetFilters" class="ghost-button" type="button">重置筛选</button>
      </div>
      <div class="filter-grid">
        <label class="field">
          <span>搜索股票</span>
          <input id="searchInput" type="search" placeholder="输入股票名或代码">
        </label>
        <label class="field">
          <span>候选状态</span>
          <select id="candidateFilter">
            <option value="all">全部</option>
            <option value="only">仅候选</option>
          </select>
        </label>
        <label class="field">
          <span>PE 历史分位 ≤</span>
          <input id="peFilter" type="number" min="0" max="100" step="1" placeholder="例如 20">
        </label>
        <label class="field">
          <span>PB 历史分位 ≤</span>
          <input id="pbFilter" type="number" min="0" max="100" step="1" placeholder="例如 20">
        </label>
        <label class="field">
          <span>ROE ≥</span>
          <input id="roeFilter" type="number" min="0" max="100" step="1" placeholder="例如 8">
        </label>
        <label class="field">
          <span>当前口径值 ≥</span>
          <input id="currentValueFilter" type="number" min="0" step="0.01" placeholder="例如 1">
        </label>
      </div>
    </section>

    <section class="summary-grid" id="summaryGrid"></section>

    <section class="table-panel">
      <div class="section-head table-head">
        <div>
          <p class="eyebrow">Rankings</p>
          <h2>当前方法下的主表</h2>
        </div>
        <p id="resultSummary" class="muted-text">载入中...</p>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-sort="rank">排名</th>
              <th data-sort="name">股票</th>
              <th data-sort="currentValue">当前口径值</th>
              <th data-sort="cumulativeValue">累计口径值</th>
              <th data-sort="pePercentile">PE分位</th>
              <th data-sort="pbPercentile">PB分位</th>
              <th data-sort="roe">ROE</th>
              <th data-sort="latestFundCount">最新基金家数</th>
              <th data-sort="candidate">候选</th>
              <th>详情</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="featured-panel">
      <div class="section-head">
        <div>
          <p class="eyebrow">Featured</p>
          <h2>快速跳转代表性股票</h2>
        </div>
      </div>
      <div id="featuredList" class="featured-list"></div>
    </section>
  </main>

  <script type="module" src="./dashboard.js"></script>
</body>
</html>
