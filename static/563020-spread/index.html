<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>563020 股息率、国债利率与息差走势</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230d6665'/%3E%3Cpath d='M14 42h10l8-10 8 6 10-15' fill='none' stroke='%23fff7ee' stroke-width='5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./563020-spread.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Static Dashboard</p>
        <h1>563020 vs 10Y 国债利率</h1>
        <p class="hero-text">
          用近三年重叠交易日，观察易方达中证红利低波动 ETF（563020）对应指数股息率、
          中国 10 年期国债收益率，以及二者息差的变化。
        </p>
      </div>
      <div class="hero-meta" id="heroMeta"></div>
    </section>

    <section class="control-bar">
      <div class="range-switch" id="rangeSwitch" aria-label="区间切换">
        <button type="button" data-range="1Y">近1年</button>
        <button type="button" data-range="3Y" class="is-active">近3年</button>
        <button type="button" data-range="ALL">全部</button>
      </div>
      <div class="legend-switches" id="legendSwitches"></div>
    </section>

    <section class="metric-grid">
      <article class="metric-card">
        <p class="metric-label">指数股息率</p>
        <h2 id="dividendYieldValue">--</h2>
        <p id="dividendYieldSub" class="metric-sub">--</p>
      </article>
      <article class="metric-card">
        <p class="metric-label">10Y 国债利率</p>
        <h2 id="treasuryYieldValue">--</h2>
        <p id="treasuryYieldSub" class="metric-sub">--</p>
      </article>
      <article class="metric-card metric-card-accent">
        <p class="metric-label">股债息差</p>
        <h2 id="spreadValue">--</h2>
        <p id="spreadSub" class="metric-sub">--</p>
      </article>
      <article class="metric-card">
        <p class="metric-label">股息率区间分位</p>
        <h2 id="dividendPercentileValue">--</h2>
        <p id="dividendPercentileSub" class="metric-sub">--</p>
      </article>
    </section>

    <section class="content-grid">
      <article class="chart-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Trend</p>
            <h2>三条曲线同轴对比</h2>
          </div>
          <p class="panel-note">单位统一为 %，息差 = 股息率 - 10Y 国债利率</p>
        </div>

        <div class="chart-frame">
          <svg id="mainChart" viewBox="0 0 1120 560" role="img" aria-label="563020 股息率、10年期国债收益率和息差走势"></svg>
          <div class="chart-tooltip is-hidden" id="chartTooltip"></div>
        </div>
      </article>

      <aside class="side-panel">
        <article class="note-card">
          <p class="eyebrow">Readout</p>
          <h2 id="readoutDate">--</h2>
          <dl class="readout-list" id="readoutList"></dl>
        </article>

        <article class="note-card">
          <p class="eyebrow">Spread Benchmarks</p>
          <div class="benchmark-grid" id="benchmarkGrid"></div>
        </article>

        <article class="note-card">
          <p class="eyebrow">Method</p>
          <ul class="bullet-list" id="noteList"></ul>
        </article>
      </aside>
    </section>

    <section class="sources-panel">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Sources</p>
          <h2>数据来源与口径</h2>
        </div>
      </div>
      <div class="sources-list" id="sourcesList"></div>
    </section>
  </main>

  <script src="./563020_spread_data.js"></script>
  <script src="./563020-spread.js"></script>
</body>
</html>
